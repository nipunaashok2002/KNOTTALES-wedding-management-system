{% extends "base.html" %}
{% load static %}
{% block title %}Login — KnotTales{% endblock %}

{% block content %}

<section class="section container fade-in" style="max-width:480px;">
    <h1 class="section-title">Welcome Back</h1>

    <div class="auth-card">

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn-primary full-width">Log In</button>

            <p class="auth-text">
                Don't have an account?
                <a href="{% url 'register' %}">Create one</a>
            </p>
        </form>

    </div>
</section>

{% endblock %}
